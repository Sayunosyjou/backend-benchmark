syntax = "proto3";

package social.v1;

option java_multiple_files = true;
option java_package = "com.example.social.v1";
option java_outer_classname = "PostProto";
option go_package = "core-service-go/proto;proto";

service PostService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc GetPost(GetPostRequest) returns (GetPostResponse);
  rpc GetHotFeed(GetHotFeedRequest) returns (GetHotFeedResponse);
  rpc LikePost(LikePostRequest) returns (LikePostResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message Post {
  string post_id = 1;
  string author_id = 2;
  string content = 3;
  repeated string tags = 4;
  int64 created_at_unix_ms = 5;
  int64 like_count = 6;
  string status = 7;
}

message CreatePostRequest {
  string author_id = 1;
  string content = 2;
  repeated string tags = 3;
}

message CreatePostResponse {
  string post_id = 1;
  int64 created_at_unix_ms = 2;
  string status = 3;
}

message GetPostRequest { string post_id = 1; }
message GetPostResponse { Post post = 1; }

message GetHotFeedRequest { int32 limit = 1; }
message GetHotFeedResponse { repeated Post posts = 1; }

message LikePostRequest {
  string post_id = 1;
  string user_id = 2;
}

message LikePostResponse {
  string post_id = 1;
  int64 like_count = 2;
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  int64 server_time_unix_ms = 2;
}
